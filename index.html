<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Belfius Agentic Transformation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── THEMES ── */
body.theme-default{
  --bg:#0a1628;--bg-mid:#112240;--bg-light:#1a3460;
  --accent:#c9a84c;--accent-light:#e8c96a;--accent-dim:#8a6f30;
  --text:#e6f1ff;--text-dim:#ccd6f6;--text-muted:#8892b0;--text-soft:#a8b2d8;
  --border:rgba(201,168,76,.14);--border-hover:rgba(201,168,76,.32);
  --card-bg:#112240;--card-grad:linear-gradient(135deg,#112240,rgba(26,52,96,.55));
  --card-accent-bg:linear-gradient(135deg,rgba(201,168,76,.1),rgba(26,52,96,.4));
  --card-accent-border:rgba(201,168,76,.28);
  --sidebar-bg:rgba(17,34,64,.97);--sidebar-border:rgba(201,168,76,.12);
  --btn-primary:linear-gradient(135deg,#c9a84c,#8a6f30);--btn-primary-text:#0a1628;
  --nav-active-bg:rgba(201,168,76,.15);--nav-active-text:#e8c96a;
  --nav-hover:rgba(201,168,76,.08);
  --red:#e85d5d;--green:#4caf82;--amber:#f0a843;--blue:#4a9eff;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  --radius:12px;--radius-sm:8px;
}
body.theme-belfius{
  --bg:#ffffff;--bg-mid:#f4f6fa;--bg-light:#e8edf5;
  --accent:#cc0000;--accent-light:#e53333;--accent-dim:#990000;
  --text:#1a1a2e;--text-dim:#2d2d44;--text-muted:#6b7280;--text-soft:#4b5563;
  --border:rgba(204,0,0,.12);--border-hover:rgba(204,0,0,.3);
  --card-bg:#ffffff;--card-grad:linear-gradient(135deg,#ffffff,#f8f9fc);
  --card-accent-bg:linear-gradient(135deg,rgba(204,0,0,.05),rgba(248,249,252,1));
  --card-accent-border:rgba(204,0,0,.2);
  --sidebar-bg:#cc0000;--sidebar-border:rgba(255,255,255,.15);
  --btn-primary:linear-gradient(135deg,#cc0000,#990000);--btn-primary-text:#ffffff;
  --nav-active-bg:rgba(255,255,255,.22);--nav-active-text:#ffffff;
  --nav-hover:rgba(255,255,255,.1);
  --red:#e85d5d;--green:#16a34a;--amber:#d97706;--blue:#2563eb;
  --font-head:'Source Sans 3',sans-serif;--font-body:'Source Sans 3',sans-serif;
  --radius:6px;--radius-sm:4px;
}
body.theme-belfius .sidebar{color:#ffffff}
body.theme-belfius .nav-item{color:rgba(255,255,255,.75)}
body.theme-belfius .nav-item:hover{color:#ffffff;background:rgba(255,255,255,.12)}
body.theme-belfius .nav-item.active{color:#ffffff;background:rgba(255,255,255,.22)}
body.theme-belfius .sidebar .btn-ghost{color:rgba(255,255,255,.75);border-color:rgba(255,255,255,.3)}
body.theme-belfius .sidebar .btn-ghost:hover{color:#ffffff;border-color:rgba(255,255,255,.7)}
body.theme-belfius .sidebar .btn-primary{background:#ffffff;color:#cc0000;border:none}
body.theme-belfius .sidebar #gh-save-btn{background:#ffffff;color:#cc0000}
body.theme-belfius .theme-btn{color:rgba(255,255,255,.75);border-color:rgba(255,255,255,.3)}
body.theme-belfius .theme-btn.active{background:#ffffff;color:#cc0000;border-color:transparent}
body.theme-belfius .sidebar #gh-status{color:rgba(255,255,255,.7)}
body.theme-belfius .sidebar #role-badge-wrap .badge{background:rgba(255,255,255,.2);color:#ffffff;border-color:rgba(255,255,255,.3)}
body.theme-belfius .dot-red{background:#ffaaaa}

html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
h1,h2,h3,h4{font-family:var(--font-head)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg-light);border-radius:3px}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes glow{0%,100%{box-shadow:0 0 8px var(--accent-dim)}50%{box-shadow:0 0 22px var(--accent)}}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .4s ease forwards}

.app{display:flex;min-height:100vh}
.sidebar{width:224px;flex-shrink:0;background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);
  display:flex;flex-direction:column;padding:20px 10px;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
.main{margin-left:224px;flex:1;padding:36px 40px 60px;max-width:1100px}

/* Cards */
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:var(--border-hover)}
.card-el{background:var(--card-grad);border:1px solid var(--border-hover);border-radius:var(--radius);box-shadow:0 4px 24px rgba(0,0,0,.12)}
.card-accent{background:var(--card-accent-bg);border:1px solid var(--card-accent-border);border-radius:var(--radius)}

/* Buttons */
.btn-primary{background:var(--btn-primary);color:var(--btn-primary-text);font-family:var(--font-head);font-weight:700;border:none;border-radius:var(--radius-sm);padding:10px 22px;cursor:pointer;transition:all .2s;font-size:13px}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.2)}
.btn-ghost{background:transparent;color:var(--text-soft);border:1px solid rgba(128,128,128,.25);border-radius:var(--radius-sm);padding:8px 16px;cursor:pointer;transition:all .2s;font-size:13px;font-family:var(--font-body)}
.btn-ghost:hover{border-color:var(--accent-dim);color:var(--accent-light)}
.btn-danger{background:rgba(232,93,93,.1);color:#e85d5d;border:1px solid rgba(232,93,93,.3);border-radius:var(--radius-sm);padding:6px 14px;cursor:pointer;font-size:12px;transition:all .2s}
.btn-danger:hover{background:rgba(232,93,93,.2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{background:transparent;border:1px solid var(--border);border-radius:6px;padding:5px 9px;cursor:pointer;font-size:13px;color:var(--text-muted);transition:all .2s}
.btn-icon:hover{border-color:var(--border-hover);color:var(--accent)}

/* Nav */
.nav-item{border-radius:var(--radius-sm);padding:9px 13px;cursor:pointer;transition:all .15s;color:var(--text-muted);display:flex;align-items:center;gap:9px;font-size:13.5px;user-select:none}
.nav-item:hover{background:var(--nav-hover);color:var(--text-dim)}
.nav-item.active{background:var(--nav-active-bg);color:var(--nav-active-text)}
.nav-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}

/* Badges */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:3px 9px;border-radius:5px;white-space:nowrap}
.b-amber{color:#f0a843;background:rgba(240,168,67,.1);border:1px solid rgba(240,168,67,.3)}
.b-red{color:#e85d5d;background:rgba(232,93,93,.1);border:1px solid rgba(232,93,93,.3)}
.b-blue{color:#4a9eff;background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.3)}
.b-green{color:#4caf82;background:rgba(76,175,130,.1);border:1px solid rgba(76,175,130,.3)}
.b-slate{color:var(--text-soft);background:rgba(128,128,128,.1);border:1px solid rgba(128,128,128,.2)}

/* RACI */
.r-R{color:#4caf82;font-weight:700}.r-A{color:var(--accent);font-weight:700}.r-C{color:#4a9eff}.r-I{color:var(--text-muted)}

/* Progress */
.prog-bar{height:6px;background:rgba(128,128,128,.15);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--btn-primary);transition:width .8s ease}

/* Timeline */
.tl-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--accent);background:var(--bg);flex-shrink:0;margin-top:3px}
.tl-dot.done{background:var(--accent)}
.tl-line{width:2px;background:var(--border);flex-shrink:0;min-height:36px;margin:0 auto}

/* Table */
table{width:100%;border-collapse:collapse}
th{padding:11px 14px;font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:.06em;border-bottom:1px solid var(--border);text-align:left}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text-dim)}
tr:hover td{background:rgba(128,128,128,.03)}

/* Forms */
input,select,textarea{background:var(--bg-mid);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);padding:9px 12px;width:100%;outline:none;transition:border-color .2s;font-size:13px}
input:focus,select:focus,textarea:focus{border-color:var(--accent-dim)}
select option{background:var(--bg-mid);color:var(--text)}
label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:5px;font-weight:500}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--bg-mid);border:1px solid var(--border-hover);border-radius:var(--radius);padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:modalIn .25s ease}
.modal-lg{max-width:900px}
.modal h3{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}

/* Misc layout */
.dot-red{width:8px;height:8px;background:#e85d5d;border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.gridA{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.col{display:flex;flex-direction:column}
.row{display:flex}
.wrap{flex-wrap:wrap}
.center{align-items:center}
.between{justify-content:space-between}
.f1{flex:1}
.g4{gap:4px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}.g14{gap:14px}.g16{gap:16px}.g20{gap:20px}.g24{gap:24px}.g28{gap:28px}
.avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white}
.avatar-sf{background:linear-gradient(135deg,#0070d2,#1a3460);border:1px solid rgba(0,112,210,.4)}
.avatar-bel{background:linear-gradient(135deg,var(--accent),var(--accent-dim));border:1px solid rgba(204,0,0,.3)}
.err{font-size:12px;color:#e85d5d;background:rgba(232,93,93,.08);padding:10px 13px;border-radius:var(--radius-sm);border:1px solid rgba(232,93,93,.2)}
.hidden{display:none!important}
.label{font-size:11px;color:var(--accent);letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px}
.sec-title{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px}
.overflow-x{overflow-x:auto}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.bg-grid{background-image:linear-gradient(rgba(74,158,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(74,158,255,.025) 1px,transparent 1px);background-size:40px 40px}
.admin-bar{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* Theme switcher */
.theme-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-muted);transition:all .2s;font-family:var(--font-body)}
.theme-btn.active{background:var(--btn-primary);color:var(--btn-primary-text);border-color:transparent}

/* ── FLOWCHART ── */
#fc-canvas-wrap{position:relative;overflow:auto;flex:1;background:var(--bg-mid);border:1px solid var(--border);border-radius:var(--radius);cursor:default}
#fc-svg{display:block}
.fc-node{cursor:move;user-select:none}
.fc-node rect,.fc-node ellipse,.fc-node polygon{fill:var(--bg-light);stroke:var(--accent);stroke-width:2;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));transition:stroke .2s}
.fc-node.selected rect,.fc-node.selected ellipse,.fc-node.selected polygon{stroke:var(--accent-light);stroke-width:3}
.fc-node:hover rect,.fc-node:hover ellipse,.fc-node:hover polygon{stroke:var(--accent-light)}
.fc-node text{fill:var(--text);font-family:var(--font-body);font-size:12px;pointer-events:none;dominant-baseline:middle;text-anchor:middle}
.fc-edge{fill:none;stroke:var(--accent);stroke-width:1.8;marker-end:url(#arrowhead)}
.fc-edge-label{fill:var(--text-muted);font-family:var(--font-body);font-size:11px;text-anchor:middle}
.fc-edge.selected{stroke:var(--accent-light);stroke-width:2.5}
.fc-lane-label{fill:var(--accent);font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.fc-lane-rect{fill:var(--accent);opacity:.07}
.fc-toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg-mid)}
.fc-panel{width:240px;flex-shrink:0;background:var(--card-bg);border-left:1px solid var(--border);padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.fc-panel h4{font-size:13px;font-weight:700;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.shape-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--bg-mid);transition:all .2s;font-size:11px;color:var(--text-muted)}
.shape-btn:hover{border-color:var(--border-hover);background:var(--bg-light);color:var(--text)}
.shape-btn svg{pointer-events:none}

@media(max-width:768px){
  .sidebar{width:200px}
  .main{margin-left:200px;padding:20px 16px}
  .grid2,.grid3{grid-template-columns:1fr}
}
</style>
</head>

async function doLogin(){
  var u=document.getElementById('l-user').value.trim().toLowerCase();
  var p=document.getElementById('l-pass').value;
  var er=document.getElementById('l-err');
  var btn=document.getElementById('l-btn');
  var entry=CREDS[u];
  if(!entry){ er.classList.remove('hidden'); er.textContent='Unknown username. Use: salesforce, belfius, or admin'; return; }
  btn.textContent='Checking…'; btn.disabled=true;

  // Try to load latest hashes from GitHub first (so password changes take effect)
  // If it fails, fall back to the hashes baked into this file — login still works
  try { await ghFetchCreds(); } catch(ignored){}

  var h = await sha256(p);
  btn.textContent='Sign In →'; btn.disabled=false;

  // Re-read entry after potential GitHub update
  entry = CREDS[u];
  if(h === entry.hash){
    er.classList.add('hidden');
    currentRole=entry.role;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    buildSidebar();
    navigate('overview');
  } else {
    er.classList.remove('hidden');
    er.textContent='Incorrect password.';
  }
}

// Fetch only the creds hashes from data.json — lightweight, no full data load
// Uses hardcoded repo values so it works before GH object is fully initialized
async function ghFetchCreds(){
  var url='https://api.github.com/repos/frakke11/BelfiusTracker/contents/data.json'
          +'?ref=main&nocache='+Date.now();
  var res=await fetch(url,{headers:{'Accept':'application/vnd.github.v3+json'}});
  if(!res.ok) return;
  var json=await res.json();
  var raw=decodeURIComponent(escape(atob(json.content.replace(/\n/g,''))));
  var loaded=JSON.parse(raw);
  if(loaded.creds){
    if(loaded.creds.salesforce) CREDS.salesforce.hash=loaded.creds.salesforce;
    if(loaded.creds.belfius)    CREDS.belfius.hash   =loaded.creds.belfius;
    if(loaded.creds.admin)      CREDS.admin.hash     =loaded.creds.admin;
  }
}

function rTimeline(){
  var phases=['Foundation','Realization','Deployment'].map(function(ph,i){
    var days=['0-30 days','31-60 days','61-90 days'][i];
    var dates=['March-April 2026','April-May 2026','May-June 2026'][i];
    var ms=['Scope agreement, arch design, env access','Agent builds, iterative cycles','UAT, go-live, handover'][i];
    return '<div class="card" style="padding:22px'+(i===0?';border-color:var(--border-hover)':'')+'">'
      +(i===0?'<div style="font-size:10px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">CURRENT</div>':'')
      +'<div style="font-family:var(--font-head);font-weight:700;font-size:18px">'+ph+'</div>'
      +'<div style="font-size:12px;color:var(--accent);margin-top:6px">'+days+'</div>'
      +'<div style="font-size:13px;color:var(--text-soft);margin-top:3px">'+dates+'</div>'
      +'<div style="font-size:13px;color:var(--text-muted);margin-top:10px;line-height:1.5">'+ms+'</div></div>';
  }).join('');
  var dates=KEY_DATES.map(function(kd,i){
    var last=i===KEY_DATES.length-1;
    return '<div class="row g14" style="align-items:flex-start">'
      +'<div class="col center"><div class="tl-dot" style="border-color:'+(kd.urgent?'#e85d5d':'var(--accent)')+';background:'+(kd.urgent?'rgba(232,93,93,.2)':'var(--bg)')+'"></div>'
      +(!last?'<div class="tl-line"></div>':'')+'</div>'
      +'<div style="padding-bottom:'+(last?0:20)+'px;flex:1">'
      +'<div class="row center g10 wrap">'
      +'<span style="font-family:var(--font-head);font-size:12px;color:'+(kd.urgent?'#e85d5d':'var(--accent)')+';font-weight:700">'+e(kd.date)+'</span>'
      +'<span style="font-size:14px;color:var(--text-dim)">'+e(kd.label)+'</span>'
      +(kd.urgent?'<span class="badge b-red" style="font-size:9px">URGENT</span>':'')
      +'</div>'
      +'<div style="font-size:12px;color:var(--text-muted);margin-top:2px">Owner: '+e(kd.owner)+'</div>'
      +'</div></div>';
  }).join('');
  return '<div class="col g24">'
    +'<div><div class="label">90-Day Roadmap</div><h1 style="font-size:26px;font-weight:800">Timeline</h1></div>'
    +'<div class="grid3">'+phases+'</div>'
    +'<div><div class="sec-title">Key Dates &amp; Milestones</div>'+dates+'</div></div>';
}

function renderFCSVG(){
  var svg=document.getElementById('fc-svg');
  if(!svg)return;
  // Clear
  while(svg.firstChild&&svg.firstChild.id!=='defs')svg.removeChild(svg.firstChild);
  svg.innerHTML='<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">'
    +'<polygon points="0 0, 10 3.5, 0 7" fill="var(--accent)"/></marker></defs>';

  // Draw lanes
  FC.lanes.forEach(function(lane,li){
    var col=FC_LANE_COLORS[li%FC_LANE_COLORS.length];
    var rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x','60');rect.setAttribute('y',lane.y);
    rect.setAttribute('width',FC.svgW-60);rect.setAttribute('height',lane.h);
    rect.setAttribute('fill',col.fill);rect.setAttribute('stroke',col.stroke);rect.setAttribute('stroke-width','1');
    svg.appendChild(rect);
    // Lane label (rotated)
    var labelG=document.createElementNS('http://www.w3.org/2000/svg','text');
    labelG.setAttribute('x','28');labelG.setAttribute('y',lane.y+lane.h/2);
    labelG.setAttribute('fill',col.label);labelG.setAttribute('font-size','11');
    labelG.setAttribute('font-weight','700');labelG.setAttribute('font-family','Syne,sans-serif');
    labelG.setAttribute('letter-spacing','1');labelG.setAttribute('text-anchor','middle');
    labelG.setAttribute('transform','rotate(-90,28,'+(lane.y+lane.h/2)+')');
    labelG.textContent=lane.name;
    svg.appendChild(labelG);
    // Lane divider
    if(li>0){var line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1','60');line.setAttribute('y1',lane.y);line.setAttribute('x2',FC.svgW);line.setAttribute('y2',lane.y);
      line.setAttribute('stroke',col.stroke);line.setAttribute('stroke-width','1');svg.appendChild(line);}
  });

  // Draw edges
  FC.edges.forEach(function(edge){
    var src=FC.nodes.find(function(n){return n.id===edge.from});
    var tgt=FC.nodes.find(function(n){return n.id===edge.to});
    if(!src||!tgt)return;
    var x1=src.x+src.w/2,y1=src.y+src.h/2,x2=tgt.x+tgt.w/2,y2=tgt.y+tgt.h/2;
    // Curved path
    var dx=x2-x1,dy=y2-y1,mx=(x1+x2)/2,my=(y1+y2)/2;
    var cx=mx,cy=my-(Math.abs(dx)*0.2);
    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M'+x1+','+y1+' Q'+cx+','+cy+' '+x2+','+y2);
    path.setAttribute('class','fc-edge'+(FC.selectedEdge===edge.id?' selected':''));
    path.setAttribute('data-eid',edge.id);
    svg.appendChild(path);
    // Edge label
    if(edge.label){
      var lt=document.createElementNS('http://www.w3.org/2000/svg','text');
      lt.setAttribute('x',cx);lt.setAttribute('y',cy-6);
      lt.setAttribute('class','fc-edge-label');lt.textContent=edge.label;svg.appendChild(lt);
    }
  });

  // Draw nodes
  FC.nodes.forEach(function(node){
    var g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','fc-node'+(FC.selectedNode===node.id?' selected':''));
    g.setAttribute('data-nid',node.id);
    g.setAttribute('transform','translate('+node.x+','+node.y+')');

    var shape;
    if(node.shape==='diamond'){
      var hw=node.w/2,hh=node.h/2;
      shape=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      shape.setAttribute('points',hw+',0 '+node.w+','+hh+' '+hw+','+node.h+' 0,'+hh);
    } else if(node.shape==='rounded'){
      shape=document.createElementNS('http://www.w3.org/2000/svg','rect');
      shape.setAttribute('width',node.w);shape.setAttribute('height',node.h);
      shape.setAttribute('rx',node.h/2);shape.setAttribute('ry',node.h/2);
    } else if(node.shape==='cylinder'){
      var g2=document.createElementNS('http://www.w3.org/2000/svg','g');
      var body=document.createElementNS('http://www.w3.org/2000/svg','rect');
      body.setAttribute('width',node.w);body.setAttribute('height',node.h-14);body.setAttribute('y','7');
      body.setAttribute('fill','var(--bg-light)');body.setAttribute('stroke','var(--accent)');body.setAttribute('stroke-width','2');
      var top=document.createElementNS('http://www.w3.org/2000/svg','ellipse');
      top.setAttribute('cx',node.w/2);top.setAttribute('cy','7');top.setAttribute('rx',node.w/2);top.setAttribute('ry','7');
      top.setAttribute('fill','var(--bg-light)');top.setAttribute('stroke','var(--accent)');top.setAttribute('stroke-width','2');
      var bot=document.createElementNS('http://www.w3.org/2000/svg','ellipse');
      bot.setAttribute('cx',node.w/2);bot.setAttribute('cy',node.h-7);bot.setAttribute('rx',node.w/2);bot.setAttribute('ry','7');
      bot.setAttribute('fill','var(--bg-light)');bot.setAttribute('stroke','var(--accent)');bot.setAttribute('stroke-width','2');
      g2.appendChild(body);g2.appendChild(top);g2.appendChild(bot);
      g.appendChild(g2);shape=null;
    } else {
      shape=document.createElementNS('http://www.w3.org/2000/svg','rect');
      shape.setAttribute('width',node.w);shape.setAttribute('height',node.h);shape.setAttribute('rx','8');
    }
    if(shape){
      shape.setAttribute('fill',node.fill||'var(--bg-light)');
      shape.setAttribute('stroke',node.stroke||'var(--accent)');
      shape.setAttribute('stroke-width','2');
      g.appendChild(shape);
    }

    // Text (wrapped)
    var words=(node.label||'').split(' ');
    var lineH=16,maxW=node.w-14,lines=[],cur='';
    words.forEach(function(w){var t=cur?(cur+' '+w):w;if(t.length*7>maxW&&cur){lines.push(cur);cur=w;}else cur=t;});
    if(cur)lines.push(cur);
    var totalH=lines.length*lineH;
    var startY=(node.h-totalH)/2+lineH/2;
    lines.forEach(function(line,li){
      var txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',node.w/2);txt.setAttribute('y',startY+li*lineH);
      txt.setAttribute('fill',node.textColor||'var(--text)');txt.setAttribute('font-size','12');
      txt.setAttribute('font-family','DM Sans,sans-serif');txt.setAttribute('text-anchor','middle');
      txt.setAttribute('dominant-baseline','middle');txt.textContent=line;
      g.appendChild(txt);
    });

    // Connection handles (small circles) — visible on select
    if(FC.selectedNode===node.id){
      [[node.w/2,0,'top'],[node.w,node.h/2,'right'],[node.w/2,node.h,'bottom'],[0,node.h/2,'left']].forEach(function(pt){
        var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx',pt[0]);c.setAttribute('cy',pt[1]);c.setAttribute('r','6');
        c.setAttribute('fill','var(--accent)');c.setAttribute('stroke','var(--bg)');c.setAttribute('stroke-width','2');
        c.setAttribute('class','fc-handle');c.setAttribute('data-nid',node.id);c.setAttribute('data-side',pt[2]);
        c.style.cursor='crosshair';
        g.appendChild(c);
      });
    }
    svg.appendChild(g);
  });
}

function bindFCEvents(){
  var svg=document.getElementById('fc-svg');
  if(!svg)return;
  var wrap=document.getElementById('fc-canvas-wrap');

  svg.addEventListener('mousedown',function(ev){
    var nid=findNodeAtEvent(ev);
    var eid=findEdgeAtEvent(ev);

    if(FC.connecting){
      // Second click = connect to
      if(nid&&FC.connectStart&&nid!==FC.connectStart){
        var label=prompt('Edge label (optional):','')||'';
        FC.edges.push({id:uid(),from:FC.connectStart,to:nid,label:label});
        saveCurrentFC();
      }
      FC.connectStart=null;FC.connecting=false;
      document.getElementById('fc-connect-btn').style.background='';
      document.getElementById('fc-hint').textContent='Click canvas to place shape';
      renderFCSVG();bindFCEvents();
      return;
    }

    if(nid){
      // Check if clicking a handle for connecting
      if(ev.target.classList.contains('fc-handle')){
        FC.connecting=true;FC.connectStart=nid;
        document.getElementById('fc-connect-btn').style.background='rgba(201,168,76,.2)';
        document.getElementById('fc-hint').textContent='Now click the destination node to connect';
        return;
      }
      FC.selectedNode=nid;FC.selectedEdge=null;
      var node=FC.nodes.find(function(n){return n.id===nid});
      var rect=svg.getBoundingClientRect();
      FC.dragging=node;FC.dragOffX=ev.clientX-rect.left-node.x;FC.dragOffY=ev.clientY-rect.top-node.y;
      renderFCSVG();bindFCEvents();showNodeProps(nid);
    } else if(eid){
      FC.selectedEdge=eid;FC.selectedNode=null;
      renderFCSVG();bindFCEvents();showEdgeProps(eid);
    } else {
      // Click on empty canvas = place new node if type set, else deselect
      if(FC.pendingShape){
        var rect2=svg.getBoundingClientRect();
        var x=ev.clientX-rect2.left-60,y=ev.clientY-rect2.top-25;
        addNodeAt(FC.pendingShape,x,y);
        FC.pendingShape=null;
        document.querySelectorAll('.btn-ghost').forEach(function(b){b.style.background=''});
        document.getElementById('fc-hint').textContent='Click canvas to place shape';
      } else {
        FC.selectedNode=null;FC.selectedEdge=null;
        renderFCSVG();bindFCEvents();
        document.getElementById('fc-props-content').innerHTML='<span style="font-size:13px;color:var(--text-muted)">Select a node or edge.</span>';
      }
    }
  });

  svg.addEventListener('mousemove',function(ev){
    if(!FC.dragging)return;
    var rect=svg.getBoundingClientRect();
    FC.dragging.x=Math.max(62,ev.clientX-rect.left-FC.dragOffX);
    FC.dragging.y=Math.max(0,ev.clientY-rect.top-FC.dragOffY);
    renderFCSVG();bindFCEvents();
  });

  svg.addEventListener('mouseup',function(){
    if(FC.dragging){saveCurrentFC();}
    FC.dragging=null;
  });

  svg.addEventListener('dblclick',function(ev){
    var nid=findNodeAtEvent(ev);
    if(nid){
      var node=FC.nodes.find(function(n){return n.id===nid});
      var nl=prompt('Edit label:',node.label);
      if(nl!==null){node.label=nl;saveCurrentFC();renderFCSVG();bindFCEvents();}
    }
  });
}

function findNodeAtEvent(ev){
  var svg=document.getElementById('fc-svg');
  var rect=svg.getBoundingClientRect();
  var mx=ev.clientX-rect.left,my=ev.clientY-rect.top;
  for(var i=FC.nodes.length-1;i>=0;i--){
    var n=FC.nodes[i];
    if(mx>=n.x&&mx<=n.x+n.w&&my>=n.y&&my<=n.y+n.h)return n.id;
  }
  return null;
}
function findEdgeAtEvent(ev){
  // Simple proximity check
  var svg=document.getElementById('fc-svg');
  var rect=svg.getBoundingClientRect();
  var mx=ev.clientX-rect.left,my=ev.clientY-rect.top;
  for(var i=0;i<FC.edges.length;i++){
    var edge=FC.edges[i];
    var src=FC.nodes.find(function(n){return n.id===edge.from});
    var tgt=FC.nodes.find(function(n){return n.id===edge.to});
    if(!src||!tgt)continue;
    var x1=src.x+src.w/2,y1=src.y+src.h/2,x2=tgt.x+tgt.w/2,y2=tgt.y+tgt.h/2;
    var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
    if(len<1)continue;
    var t=((mx-x1)*dx+(my-y1)*dy)/(len*len);
    t=Math.max(0,Math.min(1,t));
    var px=x1+t*dx,py=y1+t*dy;
    var dist=Math.sqrt((mx-px)*(mx-px)+(my-py)*(my-py));
    if(dist<10)return edge.id;
  }
  return null;
}

function addNode(shape){
  FC.pendingShape=shape;
  document.getElementById('fc-hint').textContent='Click on the canvas to place the '+shape+' shape';
}
function addNodeAt(shape,x,y){
  var w=shape==='diamond'?140:shape==='rounded'?130:shape==='cylinder'?110:140;
  var h=shape==='diamond'?80:shape==='rounded'?44:shape==='cylinder'?80:70;
  FC.nodes.push({id:uid(),shape:shape,x:x,y:y,w:w,h:h,label:'New Step'});
  FC.selectedNode=FC.nodes[FC.nodes.length-1].id;
  saveCurrentFC();renderFCSVG();bindFCEvents();
  showNodeProps(FC.selectedNode);
}
function toggleConnect(){
  FC.connecting=!FC.connecting;
  FC.connectStart=null;
  var btn=document.getElementById('fc-connect-btn');
  btn.style.background=FC.connecting?'rgba(201,168,76,.15)':'';
  document.getElementById('fc-hint').textContent=FC.connecting?'Click source node, then destination':'Click canvas to place shape';
}
function fcDeleteSelected(){
  if(FC.selectedNode){FC.nodes=FC.nodes.filter(function(n){return n.id!==FC.selectedNode});FC.edges=FC.edges.filter(function(e){return e.from!==FC.selectedNode&&e.to!==FC.selectedNode});FC.selectedNode=null;}
  else if(FC.selectedEdge){FC.edges=FC.edges.filter(function(e){return e.id!==FC.selectedEdge});FC.selectedEdge=null;}
  saveCurrentFC();renderFCSVG();bindFCEvents();
}
function fcClear(){if(confirm('Clear all nodes and edges?')){FC.nodes=[];FC.edges=[];saveCurrentFC();renderFCSVG();bindFCEvents();}}
function saveFC(){saveCurrentFC();alert('Flowchart saved!');}
function saveCurrentFC(){
  if(FC.currentChart===null)return;
  DATA.flowcharts[FC.currentChart].nodes=FC.nodes;
  DATA.flowcharts[FC.currentChart].edges=FC.edges;
}
function showNodeProps(nid){
  var node=FC.nodes.find(function(n){return n.id===nid});
  if(!node)return;
  var panel=document.getElementById('fc-props-content');
  if(!panel)return;
  var fillColors=['var(--bg-light)','rgba(201,168,76,.25)','rgba(74,158,255,.25)','rgba(76,175,130,.25)','rgba(232,93,93,.25)'];
  panel.innerHTML='<div class="col g10">'
    +'<div><label>Label</label><input value="'+e(node.label)+'" onchange="updateNodeProp(\''+nid+'\',\'label\',this.value)"></div>'
    +'<div><label>Width</label><input type="number" value="'+node.w+'" onchange="updateNodeProp(\''+nid+'\',\'w\',+this.value)"></div>'
    +'<div><label>Height</label><input type="number" value="'+node.h+'" onchange="updateNodeProp(\''+nid+'\',\'h\',+this.value)"></div>'
    +'<div><label>Fill Color</label><div class="row wrap g6">'
    +fillColors.map(function(c){return '<div onclick="updateNodeProp(\''+nid+'\',\'fill\',\''+c+'\')" style="width:28px;height:28px;border-radius:6px;background:'+c+';border:2px solid '+(node.fill===c?'var(--accent)':'var(--border)')+';cursor:pointer"></div>';}).join('')+'</div></div>'
    +'<div><label>Text Color</label><div class="row g6">'
    +['var(--text)','var(--accent)','#4a9eff','#4caf82','#e85d5d'].map(function(c){return '<div onclick="updateNodeProp(\''+nid+'\',\'textColor\',\''+c+'\')" style="width:28px;height:28px;border-radius:6px;background:'+c+';border:2px solid '+(node.textColor===c?'var(--text)':'var(--border)')+';cursor:pointer"></div>';}).join('')+'</div></div>'
    +'<button class="btn-danger" onclick="fcDeleteSelected()">&#10005; Delete Node</button>'
    +'</div>';
}
function showEdgeProps(eid){
  var edge=FC.edges.find(function(e){return e.id===eid});
  if(!edge)return;
  var panel=document.getElementById('fc-props-content');
  if(!panel)return;
  panel.innerHTML='<div class="col g10">'
    +'<div><label>Label</label><input value="'+e(edge.label||'')+'" onchange="updateEdgeProp(\''+eid+'\',\'label\',this.value)"></div>'
    +'<button class="btn-danger" onclick="fcDeleteSelected()">&#10005; Delete Edge</button>'
    +'</div>';
}
function updateNodeProp(nid,prop,val){
  var node=FC.nodes.find(function(n){return n.id===nid});
  if(node){node[prop]=val;saveCurrentFC();renderFCSVG();bindFCEvents();showNodeProps(nid);}
}
function updateEdgeProp(eid,prop,val){
  var edge=FC.edges.find(function(e){return e.id===eid});
  if(edge){edge[prop]=val;saveCurrentFC();renderFCSVG();bindFCEvents();}
}
function initFC(){}

/* ═══════════════════════════════════════════════════
   AUTO-SAVE — debounced commit after every mutation
═══════════════════════════════════════════════════ */
var _autoSaveTimer = null;
function autoSave(){
  if(currentRole!=='admin') return;
  var statusEl = document.getElementById('gh-status');
  if(statusEl){ statusEl.textContent='Unsaved changes…'; statusEl.style.color='var(--amber)'; }
  if(!GH.token) return; // no token = no auto-save, user must click manually
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(function(){ ghSaveData(true); }, 1800);
}

/* ═══════════════════════════════════════════════════
   PASSWORD MANAGEMENT
═══════════════════════════════════════════════════ */
function showPasswordModal(){
  showModal('<div class="modal"><h3>&#128274; Change Passwords</h3>'
    +'<p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;line-height:1.6">'
    +'Set new passwords for each role. Leave blank to keep current password.<br>'
    +'Passwords are stored as SHA-256 hashes — never as plain text.</p>'
    +['salesforce','belfius','admin'].map(function(role){
      return '<div class="form-group"><label>'+role.charAt(0).toUpperCase()+role.slice(1)+' password</label>'
        +'<input type="password" id="pw-'+role+'" placeholder="Leave blank to keep current"></div>';
    }).join('')
    +'<div class="modal-actions">'
    +'<button class="btn-ghost" onclick="closeModal()">Cancel</button>'
    +'<button class="btn-primary" onclick="savePasswords()">Save &amp; Commit</button>'
    +'</div></div>');
}
async function savePasswords(){
  var changed = false;
  for(var role of ['salesforce','belfius','admin']){
    var val = (document.getElementById('pw-'+role).value||'').trim();
    if(val){
      CREDS[role].hash = await sha256(val);
      changed = true;
    }
  }
  closeModal();
  if(changed){
    // Save new hashes to data.json immediately
    await ghSaveData(true);
    alert('Passwords updated and saved to GitHub.');
  } else {
    alert('No changes made.');
  }
}


/* ═══════════════════════════════════════════════════
   GITHUB SYNC  —  reads/writes data.json only
   index.html is NEVER touched by saves
   Repo: frakke11/BelfiusTracker
═══════════════════════════════════════════════════ */
var GH = {
  owner:  'frakke11',
  repo:   'BelfiusTracker',
  branch: 'main',
  file:   'data.json',
  get token(){ return localStorage.getItem('belfius_gh_token')||''; },
  set token(v){ localStorage.setItem('belfius_gh_token',v); },
  sha: null
};

function ghApiHeaders(){
  var h = {'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
  if(GH.token) h['Authorization'] = 'token '+GH.token;
  return h;
}

/* ── Load: fetch data.json from GitHub ── */
async function ghLoadData(){
  var statusEl = document.getElementById('gh-status');
  function setStatus(msg,col){ if(statusEl){statusEl.textContent=msg;statusEl.style.color=col||'var(--text-muted)';} }
  setStatus('Syncing…');
  try {
    var url = 'https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/'+GH.file
              +'?ref='+GH.branch+'&nocache='+Date.now();
    var res = await fetch(url, {headers: ghApiHeaders()});
    if(res.status === 404){
      setStatus('No saved data yet — using defaults', 'var(--amber)');
      return;
    }
    if(!res.ok) throw new Error('HTTP '+res.status);
    var json = await res.json();
    GH.sha = json.sha;
    var raw = decodeURIComponent(escape(atob(json.content.replace(/\n/g,''))));
    var loaded = JSON.parse(raw);
    if(loaded.useCases)    DATA.useCases    = loaded.useCases;
    if(loaded.blockers)    DATA.blockers    = loaded.blockers;
    if(loaded.kpis)        DATA.kpis        = loaded.kpis;
    if(loaded.team)        DATA.team        = loaded.team;
    if(loaded.raci)        DATA.raci        = loaded.raci;
    if(loaded.meetings)    DATA.meetings    = loaded.meetings;
    if(loaded.flowcharts)  DATA.flowcharts  = loaded.flowcharts;
    if(loaded.execSponsors)DATA.execSponsors= loaded.execSponsors;
    // Restore password hashes if saved
    if(loaded.creds){
      if(loaded.creds.salesforce) CREDS.salesforce.hash = loaded.creds.salesforce;
      if(loaded.creds.belfius)    CREDS.belfius.hash    = loaded.creds.belfius;
      if(loaded.creds.admin)      CREDS.admin.hash      = loaded.creds.admin;
    }
    setStatus('✓ Synced — '+new Date().toLocaleTimeString(), 'var(--green)');
    setTimeout(function(){setStatus('');}, 4000);
    if(currentPage) navigate(currentPage);
  } catch(err){
    console.warn('GitHub load failed:', err);
    setStatus('⚠ Could not load — using defaults', 'var(--amber)');
  }
}

/* ── Save: write DATA + hashes as data.json to GitHub ── */
async function ghSaveData(silent){
  if(!GH.token){ if(!silent) showGhTokenModal(); else { showGhTokenModal(); } return; }
  var btn = document.getElementById('gh-save-btn');
  var statusEl = document.getElementById('gh-status');
  function setStatus(msg,col){ if(statusEl){statusEl.textContent=msg;statusEl.style.color=col||'var(--text-muted)';} }
  if(btn){ btn.textContent='Saving…'; btn.disabled=true; }
  setStatus('Saving…');
  try {
    // Refresh SHA
    var getUrl = 'https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/'+GH.file
                 +'?ref='+GH.branch+'&nocache='+Date.now();
    var getRes = await fetch(getUrl, {headers: ghApiHeaders()});
    if(getRes.ok){ GH.sha = (await getRes.json()).sha; }
    else if(getRes.status !== 404){ throw new Error('Could not read current file: HTTP '+getRes.status); }
    else { GH.sha = null; }

    var payload = JSON.stringify({
      useCases:    DATA.useCases,
      blockers:    DATA.blockers,
      kpis:        DATA.kpis,
      team:        DATA.team,
      raci:        DATA.raci,
      meetings:    DATA.meetings,
      flowcharts:  DATA.flowcharts,
      execSponsors:DATA.execSponsors,
      creds:{ // store only hashes, never plain text
        salesforce: CREDS.salesforce.hash,
        belfius:    CREDS.belfius.hash,
        admin:      CREDS.admin.hash
      }
    }, null, 2);

    var encoded = btoa(unescape(encodeURIComponent(payload)));
    var body = {
      message: 'Update tracker data — '+new Date().toISOString().slice(0,16).replace('T',' '),
      content: encoded, branch: GH.branch
    };
    if(GH.sha) body.sha = GH.sha;

    var putRes = await fetch(
      'https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/'+GH.file,
      { method:'PUT', headers: ghApiHeaders(), body: JSON.stringify(body) }
    );
    if(!putRes.ok){
      var errJson = await putRes.json().catch(function(){return {};});
      throw new Error(errJson.message || 'PUT failed: HTTP '+putRes.status);
    }
    var putJson = await putRes.json();
    GH.sha = putJson.content ? putJson.content.sha : GH.sha;
    if(btn){ btn.textContent='☁ Save to GitHub'; btn.disabled=false; }
    setStatus('✓ Saved at '+new Date().toLocaleTimeString(), 'var(--green)');
    setTimeout(function(){setStatus('');}, 5000);
  } catch(err){
    console.error('GitHub save failed:', err);
    if(btn){ btn.textContent='☁ Save to GitHub'; btn.disabled=false; }
    setStatus('✗ Save failed', 'var(--red)');
    if(!silent) alert('Save failed:\n\n'+err.message+'\n\nCheck your token has "repo" write permissions.');
  }
}

/* ── Token modal ── */
function showGhTokenModal(){
  showModal('<div class="modal"><h3>&#128273; GitHub Token Required</h3>'
    +'<p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;line-height:1.7">'
    +'To save changes, you need a GitHub Personal Access Token with <strong>repo</strong> write access.<br><br>'
    +'<strong>How to create one:</strong><br>'
    +'1. Open <a href="https://github.com/settings/tokens/new" target="_blank" style="color:var(--accent)">github.com/settings/tokens/new</a><br>'
    +'2. Give it a name, set an expiry<br>'
    +'3. Tick the <strong>repo</strong> checkbox<br>'
    +'4. Click <strong>Generate token</strong> and copy it here</p>'
    +'<div class="form-group">'
    +'<label>Personal Access Token</label>'
    +'<input id="gh-tok-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxx" autocomplete="off">'
    +'</div>'
    +'<p style="font-size:11px;color:var(--text-muted);margin-top:4px">'
    +'&#128274; Saved only to <em>your</em> browser localStorage. Never written into the HTML file.</p>'
    +'<div class="modal-actions">'
    +'<button class="btn-ghost" onclick="closeModal()">Cancel</button>'
    +'<button class="btn-primary" onclick="saveGhToken()">Save Token &amp; Continue</button>'
    +'</div></div>');
}
function saveGhToken(){
  var t = (document.getElementById('gh-tok-input').value||'').trim();
  if(!t){ alert('Please paste your token first.'); return; }
  GH.token = t;
  closeModal();
  ghSaveData();
}
function clearGhToken(){
  if(confirm('Remove saved GitHub token from this browser?')){
    localStorage.removeItem('belfius_gh_token');
    var bar = document.getElementById('gh-bar');
    if(bar) injectGhBar(true); // rebuild without "clear" button
  }
}

/* ── Sidebar GitHub section ── */
function injectGhBar(force){
  var existing = document.getElementById('gh-bar');
  if(existing && !force){ return; }
  if(existing) existing.remove();
  var sidebar = document.querySelector('.sidebar');
  if(!sidebar) return;
  var bar = document.createElement('div');
  bar.id = 'gh-bar';
  bar.style.cssText = 'margin-top:auto;padding-top:12px;border-top:1px solid var(--sidebar-border);padding-left:2px;padding-right:2px';
  bar.innerHTML =
    '<div style="font-size:10px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">GitHub Sync</div>'
    +'<button id="gh-save-btn" class="btn-primary" style="width:100%;font-size:12px;padding:9px" onclick="ghSaveData(false)">&#9729; Save to GitHub</button>'
    +'<button class="btn-ghost" style="width:100%;font-size:12px;padding:7px;margin-top:6px" onclick="ghLoadData()">&#8635; Pull latest</button>'
    +'<button class="btn-ghost" style="width:100%;font-size:12px;padding:7px;margin-top:4px" onclick="showPasswordModal()">&#128274; Change Passwords</button>'
    +'<div id="gh-status" style="font-size:11px;color:var(--text-muted);margin-top:6px;min-height:16px;line-height:1.4"></div>'
    +(GH.token ? '<button onclick="clearGhToken()" class="btn-ghost" style="width:100%;font-size:11px;padding:4px;margin-top:4px;opacity:.6">Clear token</button>' : '');
  // Insert before the sign-out button
  var signOut = sidebar.querySelector('.btn-ghost[onclick="logout()"]');
  if(signOut) sidebar.insertBefore(bar, signOut);
  else sidebar.appendChild(bar);
}

/* ── Wire into buildSidebar ── */
var _origBuildSidebar = buildSidebar;
buildSidebar = function(){
  _origBuildSidebar();
  if(currentRole === 'admin'){
    injectGhBar();
    ghLoadData();
  }
};
