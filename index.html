<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Belfius Agentic Transformation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ══════════════════════════════════════════════════
   THEME: SALESFORCE LIGHT (default)
   Official SF palette: #0070D2 blue, #032D60 navy,
   #1B96FF sky, #22BEF4 cloud, #F3F3F3 bg
══════════════════════════════════════════════════ */
body.theme-default{
  --bg:#f3f2f2;--bg-mid:#ffffff;--bg-light:#eaf5fe;
  --accent:#0070d2;--accent-light:#1b96ff;--accent-dim:#005fb2;
  --text:#032d60;--text-dim:#16325c;--text-muted:#54698d;--text-soft:#3e3e3c;
  --border:rgba(0,112,210,.15);--border-hover:rgba(0,112,210,.4);
  --card-bg:#ffffff;--card-grad:linear-gradient(135deg,#ffffff,#eaf5fe);
  --card-accent-bg:linear-gradient(135deg,#eaf5fe,#f8fcff);
  --card-accent-border:rgba(0,112,210,.2);
  --sidebar-bg:#032d60;--sidebar-border:rgba(255,255,255,.1);
  --btn-primary:linear-gradient(135deg,#0070d2,#005fb2);--btn-primary-text:#ffffff;
  --nav-active-bg:rgba(255,255,255,.15);--nav-active-text:#ffffff;
  --nav-hover:rgba(255,255,255,.08);
  --red:#c23934;--green:#2e844a;--amber:#dd7a01;--blue:#0070d2;
  --font-head:'Salesforce Sans','Source Sans 3',sans-serif;
  --font-body:'Salesforce Sans','Source Sans 3',sans-serif;
  --radius:8px;--radius-sm:4px;
  --shadow:0 2px 8px rgba(0,0,0,.12);
}
/* Sidebar text for SF light */
body.theme-default .sidebar{color:#ffffff}
body.theme-default .nav-item{color:rgba(255,255,255,.72)}
body.theme-default .nav-item:hover{color:#ffffff;background:rgba(255,255,255,.1)}
body.theme-default .nav-item.active{color:#ffffff;background:rgba(255,255,255,.18);border-left:3px solid #1b96ff}
body.theme-default .sidebar .btn-ghost{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.25)}
body.theme-default .sidebar .btn-ghost:hover{color:#ffffff;border-color:rgba(255,255,255,.6)}
body.theme-default .sidebar .btn-primary{background:linear-gradient(135deg,#1b96ff,#0070d2);color:#fff}
body.theme-default .sidebar #gh-save-btn{background:linear-gradient(135deg,#1b96ff,#0070d2);color:#fff}
body.theme-default .theme-btn{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.25)}
body.theme-default .theme-btn.active{background:rgba(255,255,255,.2);color:#ffffff;border-color:rgba(255,255,255,.5)}
body.theme-default .sidebar #gh-status{color:rgba(255,255,255,.65)}
body.theme-default .sidebar #role-badge-wrap .badge{background:rgba(27,150,255,.3);color:#ffffff;border-color:rgba(27,150,255,.5)}
body.theme-default .label{color:#0070d2}
body.theme-default .card{box-shadow:var(--shadow)}
body.theme-default .bg-grid{background-image:linear-gradient(rgba(0,112,210,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,112,210,.04) 1px,transparent 1px)}

/* ══════════════════════════════════════════════════
   THEME: SALESFORCE DARK
   Deep navy + electric blue + cloud teal
══════════════════════════════════════════════════ */
body.theme-sf-dark{
  --bg:#0b1320;--bg-mid:#0e1f38;--bg-light:#112b4e;
  --accent:#1b96ff;--accent-light:#22bef4;--accent-dim:#0070d2;
  --text:#e8f4ff;--text-dim:#c9e0f5;--text-muted:#7899b8;--text-soft:#9bb8d4;
  --border:rgba(27,150,255,.15);--border-hover:rgba(27,150,255,.4);
  --card-bg:#0e1f38;--card-grad:linear-gradient(135deg,#0e1f38,rgba(17,43,78,.7));
  --card-accent-bg:linear-gradient(135deg,rgba(27,150,255,.1),rgba(14,31,56,.8));
  --card-accent-border:rgba(27,150,255,.25);
  --sidebar-bg:#040d1a;--sidebar-border:rgba(27,150,255,.12);
  --btn-primary:linear-gradient(135deg,#1b96ff,#0070d2);--btn-primary-text:#ffffff;
  --nav-active-bg:rgba(27,150,255,.18);--nav-active-text:#22bef4;
  --nav-hover:rgba(27,150,255,.08);
  --red:#f07070;--green:#3dd68c;--amber:#ffb75e;--blue:#1b96ff;
  --font-head:'Salesforce Sans','Source Sans 3',sans-serif;
  --font-body:'Salesforce Sans','Source Sans 3',sans-serif;
  --radius:8px;--radius-sm:4px;
  --shadow:0 4px 20px rgba(0,0,0,.5);
}
body.theme-sf-dark .bg-grid{background-image:linear-gradient(rgba(27,150,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(27,150,255,.04) 1px,transparent 1px)}
body.theme-sf-dark .label{color:#1b96ff}
body.theme-sf-dark .card{box-shadow:var(--shadow)}

/* ══════════════════════════════════════════════════
   THEME: BELFIUS
══════════════════════════════════════════════════ */
body.theme-belfius{
  --bg:#ffffff;--bg-mid:#f4f6fa;--bg-light:#e8edf5;
  --accent:#cc0000;--accent-light:#e53333;--accent-dim:#990000;
  --text:#1a1a2e;--text-dim:#2d2d44;--text-muted:#6b7280;--text-soft:#4b5563;
  --border:rgba(204,0,0,.12);--border-hover:rgba(204,0,0,.3);
  --card-bg:#ffffff;--card-grad:linear-gradient(135deg,#ffffff,#f8f9fc);
  --card-accent-bg:linear-gradient(135deg,rgba(204,0,0,.05),rgba(248,249,252,1));
  --card-accent-border:rgba(204,0,0,.2);
  --sidebar-bg:#cc0000;--sidebar-border:rgba(255,255,255,.15);
  --btn-primary:linear-gradient(135deg,#cc0000,#990000);--btn-primary-text:#ffffff;
  --nav-active-bg:rgba(255,255,255,.22);--nav-active-text:#ffffff;
  --nav-hover:rgba(255,255,255,.1);
  --red:#e85d5d;--green:#16a34a;--amber:#d97706;--blue:#2563eb;
  --font-head:'Source Sans 3',sans-serif;--font-body:'Source Sans 3',sans-serif;
  --radius:6px;--radius-sm:4px;
}
body.theme-belfius .sidebar{color:#ffffff}
body.theme-belfius .nav-item{color:rgba(255,255,255,.75)}
body.theme-belfius .nav-item:hover{color:#ffffff;background:rgba(255,255,255,.12)}
body.theme-belfius .nav-item.active{color:#ffffff;background:rgba(255,255,255,.22)}
body.theme-belfius .sidebar .btn-ghost{color:rgba(255,255,255,.75);border-color:rgba(255,255,255,.3)}
body.theme-belfius .sidebar .btn-ghost:hover{color:#ffffff;border-color:rgba(255,255,255,.7)}
body.theme-belfius .sidebar .btn-primary{background:#ffffff;color:#cc0000;border:none}
body.theme-belfius .sidebar #gh-save-btn{background:#ffffff;color:#cc0000}
body.theme-belfius .theme-btn{color:rgba(255,255,255,.75);border-color:rgba(255,255,255,.3)}
body.theme-belfius .theme-btn.active{background:#ffffff;color:#cc0000;border-color:transparent}
body.theme-belfius .sidebar #gh-status{color:rgba(255,255,255,.7)}
body.theme-belfius .sidebar #role-badge-wrap .badge{background:rgba(255,255,255,.2);color:#ffffff;border-color:rgba(255,255,255,.3)}
body.theme-belfius .dot-red{background:#ffaaaa}

html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
h1,h2,h3,h4{font-family:var(--font-head)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg-light);border-radius:3px}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes glow{0%,100%{box-shadow:0 0 8px var(--accent-dim)}50%{box-shadow:0 0 22px var(--accent)}}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .4s ease forwards}

.app{display:flex;min-height:100vh}
.sidebar{width:224px;flex-shrink:0;background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);
  display:flex;flex-direction:column;padding:20px 10px;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
.main{margin-left:224px;flex:1;padding:36px 40px 60px;max-width:1100px}

/* Cards */
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:var(--border-hover)}
.card-el{background:var(--card-grad);border:1px solid var(--border-hover);border-radius:var(--radius);box-shadow:0 4px 24px rgba(0,0,0,.12)}
.card-accent{background:var(--card-accent-bg);border:1px solid var(--card-accent-border);border-radius:var(--radius)}

/* Buttons */
.btn-primary{background:var(--btn-primary);color:var(--btn-primary-text);font-family:var(--font-head);font-weight:700;border:none;border-radius:var(--radius-sm);padding:10px 22px;cursor:pointer;transition:all .2s;font-size:13px}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.2)}
.btn-ghost{background:transparent;color:var(--text-soft);border:1px solid rgba(128,128,128,.25);border-radius:var(--radius-sm);padding:8px 16px;cursor:pointer;transition:all .2s;font-size:13px;font-family:var(--font-body)}
.btn-ghost:hover{border-color:var(--accent-dim);color:var(--accent-light)}
.btn-danger{background:rgba(232,93,93,.1);color:#e85d5d;border:1px solid rgba(232,93,93,.3);border-radius:var(--radius-sm);padding:6px 14px;cursor:pointer;font-size:12px;transition:all .2s}
.btn-danger:hover{background:rgba(232,93,93,.2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{background:transparent;border:1px solid var(--border);border-radius:6px;padding:5px 9px;cursor:pointer;font-size:13px;color:var(--text-muted);transition:all .2s}
.btn-icon:hover{border-color:var(--border-hover);color:var(--accent)}

/* Nav */
.nav-item{border-radius:var(--radius-sm);padding:9px 13px;cursor:pointer;transition:all .15s;color:var(--text-muted);display:flex;align-items:center;gap:9px;font-size:13.5px;user-select:none}
.nav-item:hover{background:var(--nav-hover);color:var(--text-dim)}
.nav-item.active{background:var(--nav-active-bg);color:var(--nav-active-text)}
.nav-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}

/* Badges */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:3px 9px;border-radius:5px;white-space:nowrap}
.b-amber{color:#f0a843;background:rgba(240,168,67,.1);border:1px solid rgba(240,168,67,.3)}
.b-red{color:#e85d5d;background:rgba(232,93,93,.1);border:1px solid rgba(232,93,93,.3)}
.b-blue{color:#4a9eff;background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.3)}
.b-green{color:#4caf82;background:rgba(76,175,130,.1);border:1px solid rgba(76,175,130,.3)}
.b-slate{color:var(--text-soft);background:rgba(128,128,128,.1);border:1px solid rgba(128,128,128,.2)}

/* RACI */
.r-R{color:#4caf82;font-weight:700}.r-A{color:var(--accent);font-weight:700}.r-C{color:#4a9eff}.r-I{color:var(--text-muted)}

/* Progress */
.prog-bar{height:6px;background:rgba(128,128,128,.15);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--btn-primary);transition:width .8s ease}

/* Timeline */
.tl-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--accent);background:var(--bg);flex-shrink:0;margin-top:3px}
.tl-dot.done{background:var(--accent)}
.tl-line{width:2px;background:var(--border);flex-shrink:0;min-height:36px;margin:0 auto}

/* Table */
table{width:100%;border-collapse:collapse}
th{padding:11px 14px;font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:.06em;border-bottom:1px solid var(--border);text-align:left}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text-dim)}
tr:hover td{background:rgba(128,128,128,.03)}

/* Forms */
input,select,textarea{background:var(--bg-mid);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);padding:9px 12px;width:100%;outline:none;transition:border-color .2s;font-size:13px}
input:focus,select:focus,textarea:focus{border-color:var(--accent-dim)}
select option{background:var(--bg-mid);color:var(--text)}
label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:5px;font-weight:500}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--bg-mid);border:1px solid var(--border-hover);border-radius:var(--radius);padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:modalIn .25s ease}
.modal-lg{max-width:900px}
.modal h3{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}

/* Misc layout */
.dot-red{width:8px;height:8px;background:#e85d5d;border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.gridA{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.col{display:flex;flex-direction:column}
.row{display:flex}
.wrap{flex-wrap:wrap}
.center{align-items:center}
.between{justify-content:space-between}
.f1{flex:1}
.g4{gap:4px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}.g14{gap:14px}.g16{gap:16px}.g20{gap:20px}.g24{gap:24px}.g28{gap:28px}
.avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white}
.avatar-sf{background:linear-gradient(135deg,#0070d2,#1a3460);border:1px solid rgba(0,112,210,.4)}
.avatar-bel{background:linear-gradient(135deg,var(--accent),var(--accent-dim));border:1px solid rgba(204,0,0,.3)}
.err{font-size:12px;color:#e85d5d;background:rgba(232,93,93,.08);padding:10px 13px;border-radius:var(--radius-sm);border:1px solid rgba(232,93,93,.2)}
.hidden{display:none!important}
.label{font-size:11px;color:var(--accent);letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px}
.sec-title{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px}
.overflow-x{overflow-x:auto}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.bg-grid{background-image:linear-gradient(rgba(74,158,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(74,158,255,.025) 1px,transparent 1px);background-size:40px 40px}
.admin-bar{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* Theme switcher */
.theme-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-muted);transition:all .2s;font-family:var(--font-body)}
.theme-btn.active{background:var(--btn-primary);color:var(--btn-primary-text);border-color:transparent}

/* ── FLOWCHART ── */
#fc-canvas-wrap{position:relative;overflow:auto;flex:1;background:var(--bg-mid);border:1px solid var(--border);border-radius:var(--radius);cursor:default}
#fc-svg{display:block}
.fc-node{cursor:move;user-select:none}
.fc-node rect,.fc-node ellipse,.fc-node polygon{fill:var(--bg-light);stroke:var(--accent);stroke-width:2;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));transition:stroke .2s}
.fc-node.selected rect,.fc-node.selected ellipse,.fc-node.selected polygon{stroke:var(--accent-light);stroke-width:3}
.fc-node:hover rect,.fc-node:hover ellipse,.fc-node:hover polygon{stroke:var(--accent-light)}
.fc-node text{fill:var(--text);font-family:var(--font-body);font-size:12px;pointer-events:none;dominant-baseline:middle;text-anchor:middle}
.fc-edge{fill:none;stroke:var(--accent);stroke-width:1.8;marker-end:url(#arrowhead)}
.fc-edge-label{fill:var(--text-muted);font-family:var(--font-body);font-size:11px;text-anchor:middle}
.fc-edge.selected{stroke:var(--accent-light);stroke-width:2.5}
.fc-lane-label{fill:var(--accent);font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.fc-lane-rect{fill:var(--accent);opacity:.07}
.fc-toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg-mid)}
.fc-panel{width:240px;flex-shrink:0;background:var(--card-bg);border-left:1px solid var(--border);padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.fc-panel h4{font-size:13px;font-weight:700;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.shape-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--bg-mid);transition:all .2s;font-size:11px;color:var(--text-muted)}
.shape-btn:hover{border-color:var(--border-hover);background:var(--bg-light);color:var(--text)}
.shape-btn svg{pointer-events:none}

@media(max-width:768px){
  .sidebar{width:200px}
  .main{margin-left:200px;padding:20px 16px}
  .grid2,.grid3{grid-template-columns:1fr}
}
</style>
</head>
<body class="theme-default bg-grid">

    <svg style="position:absolute;top:30%;left:10%;opacity:.04" width="200" height="150" viewBox="0 0 200 150"><path d="M70 60C74 44 89 32 106 32c22 0 40 14 46 34 8-3 17-5 26-5 28 0 52 23 52 51s-24 51-52 51H47C21 163 0 142 0 115c0-23 17-42 40-46 3-8 10-14 17-17 6-2 13-2 19 1z" fill="white"/></svg>

  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
}

async function doLogin(){
  var u = document.getElementById('l-user').value.trim().toLowerCase();
  var p = document.getElementById('l-pass').value;
  var er = document.getElementById('l-err');
  var btn = document.getElementById('l-btn');
  if(!u||!p){ er.classList.remove('hidden'); er.textContent='Please enter username and password.'; return; }
  if(btn){ btn.textContent='Checking…'; btn.disabled=true; }
  // Try fetching latest user list from GitHub first
  try { await ghFetchUsers(); } catch(e){}
  var entry = USERS[u];
  if(!entry){ 
    if(btn){ btn.textContent='Sign In →'; btn.disabled=false; }
    er.classList.remove('hidden'); er.textContent='Unknown username.'; return; 
  }
  var h = await sha256(p);
  if(btn){ btn.textContent='Sign In →'; btn.disabled=false; }
  if(h !== entry.hash){ 
    er.classList.remove('hidden'); er.textContent='Incorrect password.'; return; 
  }
  er.classList.add('hidden');
  currentUsername = u;
  currentUser     = entry;
  currentRole     = entry.role;
  // Set default customer/project for scoped users
  if(entry.assignedCustomers && entry.assignedCustomers.length){
    var ci = CUSTOMERS.findIndex(function(c){ return entry.assignedCustomers.indexOf(c.id)!==-1; });
    if(ci!==-1) currentCustomerIdx = ci;
  }
  if(entry.assignedProjects && entry.assignedProjects.length){
    var pi = (CUS().projects||[]).findIndex(function(p){ return entry.assignedProjects.indexOf(p.id)!==-1; });
    if(pi!==-1) currentProjectIdx = pi;
  }
  syncDATA();
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  buildSidebar();
  navigate('overview');
  // Load latest data from GitHub after login
  if(isSuperAdmin()) ghLoadData();
}

async function ghFetchUsers(){
  var url='https://api.github.com/repos/frakke11/BelfiusTracker/contents/data.json?ref=main&nocache='+Date.now();
  var res=await fetch(url,{headers:{'Accept':'application/vnd.github.v3+json'}});
  if(!res.ok) return;
  var json=await res.json();
  var raw=decodeURIComponent(escape(atob(json.content.replace(/\n/g,''))));
  var loaded=JSON.parse(raw);
  // Restore users
  if(loaded.users){ USERS = loaded.users; }
  // Restore customers/projects
  if(loaded.customers && loaded.customers.length){ CUSTOMERS = loaded.customers; syncDATA(); }
}
document.getElementById('l-pass').addEventListener('keydown',function(ev){if(ev.key==='Enter')doLogin()});

function canEdit(){
  // superadmin can edit anything
  if(currentRole==='superadmin') return true;
  // project_admin can edit if assigned to current project
  if(currentRole==='project_admin'){
    var prj=PRJ();
    if(!currentUser.assignedProjects||!currentUser.assignedProjects.length) return true; // all projects
    return currentUser.assignedProjects.indexOf(prj.id)!==-1;
  }
  return false;
}
function isAdmin(){ return canEdit(); } // keep backward compat alias

// Only update the active state in nav — no full rebuild
function updateNavActive(){
  document.querySelectorAll('.nav-item').forEach(function(el){ el.classList.remove('active'); });
  var page=currentPage;
  var ucActive=page==='usecases'||page.startsWith('uc-');
  document.querySelectorAll('.nav-item').forEach(function(el){
    var oc=el.getAttribute('onclick')||'';
    if(ucActive&&oc.indexOf('toggleUCSubmenu')!==-1) el.classList.add('active');
    else if(oc.indexOf("navigate('"+page+"')")!==-1) el.classList.add('active');
    else if(page.startsWith('uc-')&&oc.indexOf('goUC('+page.replace('uc-','')+')')!==-1) el.classList.add('active');
  });
}

function toggleCusDropdown(){
  var d=document.getElementById('cus-dropdown');
  if(d){ d.classList.toggle('hidden'); var pd=document.getElementById('prj-dropdown'); if(pd) pd.classList.add('hidden'); }
}
function togglePrjDropdown(){
  var d=document.getElementById('prj-dropdown');
  if(d){ d.classList.toggle('hidden'); var cd=document.getElementById('cus-dropdown'); if(cd) cd.classList.add('hidden'); }
}
document.addEventListener('click',function(ev){
  var t=ev.target;
  // Close customer dropdown if click outside both button and dropdown
  var cb=document.getElementById('cus-dropdown-btn'), cd=document.getElementById('cus-dropdown');
  if(cd&&!cd.classList.contains('hidden')&&!(cb&&cb.contains(t))&&!(cd&&cd.contains(t))) cd.classList.add('hidden');
  // Close project dropdown if click outside
  var pb=document.getElementById('prj-dropdown-btn'), pd=document.getElementById('prj-dropdown');
  if(pd&&!pd.classList.contains('hidden')&&!(pb&&pb.contains(t))&&!(pd&&pd.contains(t))) pd.classList.add('hidden');
});

function goUC(i){ navigate('uc-'+i); }

function navigate(page){
  currentPage=page;
  // Only update nav active states — no full sidebar rebuild on every navigation
  updateNavActive();
  var mc=document.getElementById('main-content');
  mc.innerHTML=renderPage(page);
  mc.classList.remove('fade-up'); void mc.offsetWidth; mc.classList.add('fade-up');
  if(page==='flowchart') initFC();
}


function renderPage(page){
  if(page.startsWith('uc-')){ return rUseCasePage(parseInt(page.replace('uc-',''))); }
  var map={overview:rOverview,usecases:rUseCasesList,timeline:rTimeline,team:rTeam,raci:rRaci,blockers:rBlockers,meetings:rMeetings,kpis:rKpis,flowchart:rFlowchart,users:rUsers};
  return (map[page]||rOverview)();
}

function renderUCOverviewTab(uc,idx){
  var mils=(uc.milestones||[]).map(function(m,mi){
    var last=mi===uc.milestones.length-1;
    return '<div class="row g14" style="align-items:flex-start">'
      +'<div class="col center"><div class="tl-dot'+(m.done?' done':'')+'"></div>'
      +(!last?'<div class="tl-line"></div>':'')+'</div>'
      +'<div style="padding-bottom:'+(last?0:14)+'px;flex:1">'
      +'<div class="row center g8 wrap">'
      +'<span style="font-size:13px;color:'+(m.done?'var(--text-muted)':'var(--text-dim)')+';text-decoration:'+(m.done?'line-through':'none')+'">'+e(m.label)+'</span>'
      +(m.atRisk?'<span class="badge b-red" style="font-size:9px">AT RISK</span>':'')
      +(canEdit()?'<button class="btn-icon" style="font-size:11px" onclick="editMilestone('+idx+','+mi+')">&#9998;</button>'
        +'<button class="btn-icon" style="color:#e85d5d;font-size:11px" onclick="deleteMilestone('+idx+','+mi+')">&#10005;</button>'
        +(m.done?'':'<input type="checkbox" onchange="toggleMil('+idx+','+mi+',this.checked)" style="width:auto;cursor:pointer;accent-color:var(--accent)">'):'' )
      +'</div>'
      +'<div style="font-size:12px;color:var(--text-muted);margin-top:2px">'+e(m.date)+'</div>'
      +'</div></div>';
  }).join('');
  return '<div class="grid2" style="gap:14px;margin-bottom:16px">'
    +[['Use Case',e(uc.title)+'<br><span style="font-size:13px;color:var(--text-muted);font-weight:400">'+e(uc.description||'')+'</span>'],
      ['Business Priority',e(uc.businessPriority||'—')],
      ['Target Users',e(uc.targetUsers||'—')],
      ['Expected Outcomes',e(uc.expectedOutcomes||'—')]].map(function(pair){
      return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden">'
        +'<div style="background:var(--accent);padding:7px 14px;font-size:10px;font-weight:700;color:#fff;letter-spacing:.08em;text-transform:uppercase">'+pair[0]+'</div>'
        +'<div style="padding:14px;font-size:13px;color:var(--text-muted);line-height:1.6">'+pair[1]+'</div></div>';
    }).join('')
    +'</div>'
    +'<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:14px">'
    +'<div style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px">Milestones</div>'
    +(mils||'<div style="font-size:13px;color:var(--text-muted)">No milestones yet.</div>')
    +(canEdit()?'<button class="btn-ghost" style="margin-top:12px;font-size:12px" onclick="addMilestone('+idx+')">+ Add Milestone</button>':'')
    +'</div>'
    +(canEdit()?'<button class="btn-primary btn-sm" onclick="editUCOverview('+idx+')">&#9998; Edit Overview</button>':'');
}

function rTimeline(){
  var dates=[
    {date:'End of March 2026',label:'Belfius sandbox access deadline',owner:'Belfius',urgent:true},
    {date:'April 21, 2026',label:'Exec F2F — Eran Agrios + BDI C-suite',owner:'All',urgent:false},
    {date:'Before mid-April',label:'UC1 architecture (Robin + Jeroen)',owner:'Salesforce',urgent:false},
    {date:'Mid-April',label:'UC1 integration design (Koen + Belfius)',owner:'Koen / Belfius',urgent:true},
    {date:'April 28-29, 2026',label:'Agent Builder Workshop (on-site)',owner:'All',urgent:false},
    {date:'Mid-June',label:'UC1 test execution',owner:'Belfius',urgent:false},
    {date:'Mid-June',label:'UC1 UAT & sign-off',owner:'Belfius',urgent:false}
  ];
  var phases=['Foundation','Realization','Deployment'].map(function(ph,i){
    var d=['March-April 2026','April-May 2026','May-June 2026'][i];
    var ms=['Scope agreement, arch design, env access','Agent builds, iterative cycles','UAT, go-live, handover'][i];
    var icons=['🏗','⚙️','🚀'];
    return '<div class="card" style="padding:22px'+(i===0?';border-left:3px solid var(--accent)':'')+'">'
      +(i===0?'<div style="font-size:10px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;font-weight:700">CURRENT</div>':'')
      +'<div style="font-size:20px;margin-bottom:8px">'+icons[i]+'</div>'
      +'<div style="font-family:var(--font-head);font-weight:700;font-size:18px">'+ph+'</div>'
      +'<div style="font-size:12px;color:var(--accent);margin-top:6px">'+d+'</div>'
      +'<div style="font-size:13px;color:var(--text-muted);margin-top:10px;line-height:1.5">'+ms+'</div></div>';
  }).join('');
  var timeline=dates.map(function(kd,i){
    var last=i===dates.length-1;
    return '<div class="row g14" style="align-items:flex-start">'
      +'<div class="col center"><div class="tl-dot" style="border-color:'+(kd.urgent?'var(--red)':'var(--accent)')+';background:'+(kd.urgent?'rgba(232,93,93,.2)':'var(--bg)')+'"></div>'
      +(!last?'<div class="tl-line"></div>':'')+'</div>'
      +'<div style="padding-bottom:'+(last?0:20)+'px;flex:1">'
      +'<div class="row center g10 wrap">'
      +'<span style="font-family:var(--font-head);font-size:12px;color:'+(kd.urgent?'var(--red)':'var(--accent)')+';font-weight:700">'+e(kd.date)+'</span>'
      +'<span style="font-size:14px;color:var(--text-dim)">'+e(kd.label)+'</span>'
      +(kd.urgent?'<span class="badge b-red" style="font-size:9px">URGENT</span>':'')
      +'</div>'
      +'<div style="font-size:12px;color:var(--text-muted);margin-top:2px">Owner: '+e(kd.owner)+'</div>'
      +'</div></div>';
  }).join('');
  return '<div class="col g24">'
    +'<div><div class="label">90-Day Roadmap</div><h1 style="font-size:26px;font-weight:800">Timeline</h1></div>'
    +'<div class="grid3">'+phases+'</div>'
    +'<div><div class="sec-title">Key Dates &amp; Milestones</div>'+timeline+'</div></div>';
}

function rRaci(){

  var vals=['R','A','C','I'];
  var rows=(DATA.raci||[]).map(function(row,ri){
    var cells=cols.map(function(c){
      if(canEdit()){
        return '<td style="text-align:center"><select onchange="DATA.raci['+ri+'][\''+c.k+'\']=this.value;autoSave()" style="width:60px;padding:4px;text-align:center;font-family:var(--font-head);font-weight:700;font-size:13px;color:'+(row[c.k]==='R'?'#4caf82':row[c.k]==='A'?'var(--accent)':row[c.k]==='C'?'#4a9eff':'var(--text-muted)')+';">'
          +vals.map(function(v){return '<option'+(v===row[c.k]?' selected':'')+'>'+v+'</option>';}).join('')+'</select></td>';
      }
      return '<td style="text-align:center"><span class="r-'+row[c.k]+'" style="font-family:var(--font-head);font-size:13px">'+row[c.k]+'</span></td>';
    }).join('');
    return '<tr><td style="min-width:220px">'+e(row.a)
      +(canEdit()?'<button class="btn-icon" style="margin-left:8px;font-size:11px" onclick="deleteRaciRow('+ri+')">&#10005;</button>':'')
      +'</td>'+cells+'</tr>';
  }).join('');
  var legend=[['R','r-R','Responsible'],['A','r-A','Accountable'],['C','r-C','Consulted'],['I','r-I','Informed']].map(function(x){
    return '<div class="row center g6" style="font-size:13px;color:var(--text-muted)"><span class="'+x[1]+'" style="font-family:var(--font-head);font-weight:700">'+x[0]+'</span><span>'+x[2]+'</span></div>';
  }).join('');
  return '<div class="col g24">'

async function saveUserFromForm(existingUsername){
  var uname=(document.getElementById('u-uname').value||'').trim().toLowerCase().replace(/\s+/g,'_');
  var name=document.getElementById('u-name').value;
  var role=document.getElementById('u-role').value;
  var pass=document.getElementById('u-pass').value;
  var cus=[]; document.querySelectorAll('.u-cus:checked').forEach(function(cb){cus.push(cb.value);});
  var prjs=[]; document.querySelectorAll('.u-prj:checked').forEach(function(cb){prjs.push(cb.value);});
  if(!uname){alert('Username required');return;}
  var hash=existingUsername&&USERS[existingUsername]&&!pass?USERS[existingUsername].hash:(pass?await sha256(pass):null);
  if(!hash){alert('Password required for new users');return;}
  if(existingUsername&&existingUsername!==uname) delete USERS[existingUsername];
  USERS[uname]={hash:hash,role:role,name:name,assignedCustomers:cus,assignedProjects:prjs};
  closeModal();navigate('users');autoSave();
}

var _autoSaveTimer = null;
function autoSave(){
  if(!canEdit()) return;
  var statusEl = document.getElementById('gh-status');
  if(statusEl){ statusEl.textContent='Unsaved changes…'; statusEl.style.color='var(--amber)'; }
  if(typeof GH==='undefined'||!GH.token) return; // no token = no auto-save
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(function(){ ghSaveData(true); }, 1800);
}

var GH = {
  owner:  'frakke11',
  repo:   'BelfiusTracker',
  branch: 'main',
  file:   'data.json',
  get token(){ return localStorage.getItem('belfius_gh_token')||''; },
  set token(v){ localStorage.setItem('belfius_gh_token',v); },
  sha: null
};

function ghApiHeaders(){
  var h = {'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
  if(GH.token) h['Authorization'] = 'token '+GH.token;
  return h;
}

/* ── Load: fetch data.json from GitHub ── */
async function ghLoadData(){
  var statusEl = document.getElementById('gh-status');
  function setStatus(msg,col){ if(statusEl){statusEl.textContent=msg;statusEl.style.color=col||'var(--text-muted)';} }
  setStatus('Syncing…');
  try {
    var url = 'https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/'+GH.file
              +'?ref='+GH.branch+'&nocache='+Date.now();
    var res = await fetch(url, {headers: ghApiHeaders()});
    if(res.status === 404){
      setStatus('No saved data yet — using defaults', 'var(--amber)');
      return;
    }
    if(!res.ok) throw new Error('HTTP '+res.status);
    var json = await res.json();
    GH.sha = json.sha;
    var raw = decodeURIComponent(escape(atob(json.content.replace(/\n/g,''))));
    var loaded = JSON.parse(raw);
    if(loaded.users){ USERS = loaded.users; }
    if(loaded.customers && loaded.customers.length){ CUSTOMERS = loaded.customers; syncDATA(); }
    // All data is inside customers array — no flat field restore needed
    setStatus('✓ Synced — '+new Date().toLocaleTimeString(), 'var(--green)');
    setTimeout(function(){setStatus('');}, 4000);
    syncDATA();
    // Silently refresh current page content without rebuilding sidebar
    var mc=document.getElementById('main-content');
    if(mc && currentPage) mc.innerHTML=renderPage(currentPage);
  } catch(err){
    console.warn('GitHub load failed:', err);
    setStatus('⚠ Could not load — using defaults', 'var(--amber)');
  }
}

/* ── Save: write DATA + hashes as data.json to GitHub ── */
async function ghSaveData(silent){
  if(!GH.token){ if(!silent) showGhTokenModal(); else { showGhTokenModal(); } return; }
  var btn = document.getElementById('gh-save-btn');
  var statusEl = document.getElementById('gh-status');
  function setStatus(msg,col){ if(statusEl){statusEl.textContent=msg;statusEl.style.color=col||'var(--text-muted)';} }
  if(btn){ btn.textContent='Saving…'; btn.disabled=true; }
  setStatus('Saving…');
  try {
    // Refresh SHA
    var getUrl = 'https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/'+GH.file
                 +'?ref='+GH.branch+'&nocache='+Date.now();
    var getRes = await fetch(getUrl, {headers: ghApiHeaders()});
    if(getRes.ok){ GH.sha = (await getRes.json()).sha; }
    else if(getRes.status !== 404){ throw new Error('Could not read current file: HTTP '+getRes.status); }
    else { GH.sha = null; }

    // Save USERS + all CUSTOMERS (which contain all projects and their data)
    var payload = JSON.stringify({
      users: USERS,
      customers: CUSTOMERS
    }, null, 2);

    var encoded = btoa(unescape(encodeURIComponent(payload)));
    var body = {
      message: 'Update tracker data — '+new Date().toISOString().slice(0,16).replace('T',' '),
      content: encoded, branch: GH.branch
    };
    if(GH.sha) body.sha = GH.sha;

    var putRes = await fetch(
      'https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/'+GH.file,
      { method:'PUT', headers: ghApiHeaders(), body: JSON.stringify(body) }
    );
    if(!putRes.ok){
      var errJson = await putRes.json().catch(function(){return {};});
      throw new Error(errJson.message || 'PUT failed: HTTP '+putRes.status);
    }
    var putJson = await putRes.json();
    GH.sha = putJson.content ? putJson.content.sha : GH.sha;
    if(btn){ btn.textContent='☁ Save to GitHub'; btn.disabled=false; }
    setStatus('✓ Saved at '+new Date().toLocaleTimeString(), 'var(--green)');
    setTimeout(function(){setStatus('');}, 5000);
  } catch(err){
    console.error('GitHub save failed:', err);
    if(btn){ btn.textContent='☁ Save to GitHub'; btn.disabled=false; }
    setStatus('✗ Save failed', 'var(--red)');
    if(!silent) alert('Save failed:\n\n'+err.message+'\n\nCheck your token has "repo" write permissions.');
  }
}

/* ── Token modal ── */
function showGhTokenModal(){
  showModal('<div class="modal"><h3>&#128273; GitHub Token Required</h3>'
    +'<p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;line-height:1.7">'
    +'To save changes, you need a GitHub Personal Access Token with <strong>repo</strong> write access.<br><br>'
    +'<strong>How to create one:</strong><br>'
    +'1. Open <a href="https://github.com/settings/tokens/new" target="_blank" style="color:var(--accent)">github.com/settings/tokens/new</a><br>'
    +'2. Give it a name, set an expiry<br>'
    +'3. Tick the <strong>repo</strong> checkbox<br>'
    +'4. Click <strong>Generate token</strong> and copy it here</p>'
    +'<div class="form-group">'
    +'<label>Personal Access Token</label>'
    +'<input id="gh-tok-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxx" autocomplete="off">'
    +'</div>'
    +'<p style="font-size:11px;color:var(--text-muted);margin-top:4px">'
    +'&#128274; Saved only to <em>your</em> browser localStorage. Never written into the HTML file.</p>'
    +'<div class="modal-actions">'
    +'<button class="btn-ghost" onclick=\"closeModal()\">Cancel</button>'
    +'<button class="btn-primary" onclick=\"closeModal()\">Save Token &amp; Continue</button>'
    +'</div></div>');
}
function saveGhToken(){
  var t = (document.getElementById('gh-tok-input').value||'').trim();
  if(!t){ alert('Please paste your token first.'); return; }
  GH.token = t;
  closeModal();
  ghSaveData();
}
function clearGhToken(){
  if(confirm('Remove saved GitHub token from this browser?')){
    localStorage.removeItem('belfius_gh_token');
    var bar = document.getElementById('gh-bar');
    if(bar) injectGhBar(true); // rebuild without "clear" button
  }
}

/* ── Sidebar GitHub section ── */
function injectGhBar(force){
  var existing = document.getElementById('gh-bar');
  if(existing && !force){ return; }
  if(existing) existing.remove();
  var sidebar = document.querySelector('.sidebar');
  if(!sidebar) return;
  var bar = document.createElement('div');
  bar.id = 'gh-bar';
  bar.style.cssText = 'margin-top:auto;padding-top:12px;border-top:1px solid var(--sidebar-border);padding-left:2px;padding-right:2px';
  bar.innerHTML =
    '<div style="font-size:10px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">GitHub Sync</div>'
    +'<button id="gh-save-btn" class="btn-primary" style="width:100%;font-size:12px;padding:9px" onclick=\"closeModal()\">&#9729; Save to GitHub</button>'
    +'<button class="btn-ghost" style="width:100%;font-size:12px;padding:7px;margin-top:6px" onclick=\"closeModal()\">&#8635; Pull latest</button>'
    +'<button class="btn-ghost" style="width:100%;font-size:12px;padding:7px;margin-top:4px" onclick=\"closeModal()\">&#128100; Manage Users</button>'
    +'<div id="gh-status" style="font-size:11px;color:var(--text-muted);margin-top:6px;min-height:16px;line-height:1.4"></div>'
    +(GH.token ? '<button onclick=\"closeModal()\" class="btn-ghost" style="width:100%;font-size:11px;padding:4px;margin-top:4px;opacity:.6">Clear token</button>' : '');
  // Insert before the sign-out button
  var signOut = sidebar.querySelector('.btn-ghost[onclick=\"closeModal()\"]');
  if(signOut) sidebar.insertBefore(bar, signOut);
  else sidebar.appendChild(bar);
}

</script>
</body>
