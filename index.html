<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Belfius Agentic Transformation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>
<body class="theme-default bg-grid">

<!-- LOGIN -->
<div id="login-screen" class="login-wrap" style="background:linear-gradient(160deg,#032d60 0%,#0b5cab 50%,#032d60 100%)">
  <!-- SF decorative clouds background -->
  <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none">
    <svg style="position:absolute;top:-60px;right:-80px;opacity:.07" width="500" height="400" viewBox="0 0 500 400"><path d="M180 160C190 110 230 80 275 80c55 0 100 35 115 85 20-8 42-12 65-12 70 0 130 57 130 128s-60 128-130 128H120C55 409 0 356 0 290c0-58 43-107 100-116 8-20 24-35 43-42 16-6 33-6 49 2 6 2 11 5 15 9 3 3 5 6 5 9 7-5 15-9 23-13z" fill="white"/></svg>
    <svg style="position:absolute;bottom:-40px;left:-60px;opacity:.05" width="400" height="300" viewBox="0 0 400 300"><path d="M140 120C148 88 178 65 213 65c43 0 79 28 91 67 16-7 33-10 51-10 55 0 103 45 103 101s-48 101-103 101H93C41 324 0 283 0 229c0-46 34-84 79-91 6-16 19-28 34-33 13-5 26-5 38 1z" fill="white"/></svg>
    <svg style="position:absolute;top:30%;left:10%;opacity:.04" width="200" height="150" viewBox="0 0 200 150"><path d="M70 60C74 44 89 32 106 32c22 0 40 14 46 34 8-3 17-5 26-5 28 0 52 23 52 51s-24 51-52 51H47C21 163 0 142 0 115c0-23 17-42 40-46 3-8 10-14 17-17 6-2 13-2 19 1z" fill="white"/></svg>
  </div>
  <div style="width:100%;max-width:420px;position:relative;z-index:1" class="fade-up">
    <!-- SF Logo + Agentforce header -->
    <div style="text-align:center;margin-bottom:36px">
      <!-- Salesforce logo -->
      <div style="display:inline-flex;flex-direction:column;align-items:center;gap:12px">
        <img src="https://raw.githubusercontent.com/frakke11/BelfiusTracker/main/Salesforce.com_logo.svg%20(1).png" alt="Salesforce" style="height:52px;width:auto;filter:brightness(0) invert(1);object-fit:contain" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div style="display:none;flex-direction:column;align-items:center;gap:4px">
          <svg width="72" height="50" viewBox="0 0 72 50" fill="none"><path d="M30 9.2C32.5 6.3 36 4.5 40 4.5c5.7 0 10.5 3.2 12.9 8 2-.9 4.2-1.4 6.6-1.4 8.2 0 14.9 6.8 14.9 15.1S67.7 41.3 59.5 41.3H18.5C10.7 41.3 4.5 35.2 4.5 27.5c0-6.8 4.9-12.5 11.5-13.4.9-2.3 2.8-4.1 5.1-5 1.9-.7 3.9-.7 5.7.2.7.3 1.4.7 1.9 1.2.3.3.6.6.7.8.8-.8 1.7-1.4 2.6-1.9z" fill="white"/></svg>
          <div style="font-family:'Source Sans 3',sans-serif;font-weight:700;font-size:22px;color:#ffffff">Salesforce</div>
        </div>
        <div>
          <div style="font-size:12px;color:rgba(255,255,255,.75);letter-spacing:.1em;text-transform:uppercase;margin-top:6px;text-align:center">Agentforce Team</div>
        </div>
      </div>
      <!-- Agentforce pill -->
      <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(27,150,255,.25);border:1px solid rgba(27,150,255,.5);border-radius:20px;padding:6px 16px;margin-top:16px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="rgba(27,150,255,0.4)" stroke="#22bef4" stroke-width="1.5"/><path d="M8 14s1.5 2 4 2 4-2 4-2" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="10" r="1.5" fill="#fff"/><circle cx="15" cy="10" r="1.5" fill="#fff"/></svg>
        <span style="font-size:12px;color:#ffffff;font-weight:600;letter-spacing:.06em">Agentforce Program Tracker</span>
      </div>
    </div>
    <!-- Login card -->
    <div style="background:rgba(255,255,255,.97);border-radius:8px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <h2 style="font-size:20px;font-weight:700;margin-bottom:6px;color:#032d60;font-family:'Source Sans 3',sans-serif">Sign in to your account</h2>
      <p style="font-size:13px;color:#54698d;margin-bottom:24px">Sign in to access your program workspace</p>
      <div class="col g16">
        <div>
          <label style="color:#3e3e3c;font-size:13px;font-weight:600;margin-bottom:5px;display:block">Username</label>
          <input id="l-user" type="text" placeholder="Enter your username" autocomplete="off" style="background:#fff;border:1px solid #dddbda;color:#032d60;border-radius:4px"/>
        </div>
        <div>
          <label style="color:#3e3e3c;font-size:13px;font-weight:600;margin-bottom:5px;display:block">Password</label>
          <input id="l-pass" type="password" placeholder="••••••••" style="background:#fff;border:1px solid #dddbda;color:#032d60;border-radius:4px"/>
        </div>
        <div id="l-err" class="err hidden"></div>
        <button id="l-btn" style="width:100%;padding:13px 24px;margin-top:4px;font-size:15px;font-weight:700;background:linear-gradient(135deg,#0070d2,#005fb2);color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:'Source Sans 3',sans-serif;transition:all .2s" onclick="doLogin()">Log In</button>
      </div>
    </div>
    <!-- Footer -->
    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:24px;opacity:.6">
      <img src="https://raw.githubusercontent.com/frakke11/BelfiusTracker/main/Salesforce.com_logo.svg%20(1).png" alt="Salesforce" style="height:18px;width:auto;filter:brightness(0) invert(1);opacity:.7;object-fit:contain" onerror="this.style.display='none'">
      <span style="color:white;font-size:12px;font-weight:600;letter-spacing:.06em">Agentforce Team</span>
    </div>
    <p style="text-align:center;font-size:11px;color:rgba(255,255,255,.35);margin-top:16px">Confidential — Salesforce Agentforce Team</p>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="hidden">
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div id="sidebar-header" style="padding:4px 8px 16px;border-bottom:1px solid var(--sidebar-border);margin-bottom:8px">
        <!-- Salesforce logo -->
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <img src="https://raw.githubusercontent.com/frakke11/BelfiusTracker/main/Salesforce.com_logo.svg%20(1).png" alt="Salesforce" style="height:22px;width:auto;filter:brightness(0) invert(1);object-fit:contain;flex-shrink:0" onerror="this.style.display='none'">
          <div>
            <div style="font-family:var(--font-head);font-weight:700;font-size:13px;color:#ffffff;letter-spacing:.01em">Agentforce Team</div>
          </div>
        </div>
        <!-- Agentforce badge -->
        <div style="display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.1);border-radius:6px;padding:6px 10px;border:1px solid rgba(255,255,255,.15)">
          <!-- Astro/Agentforce icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" fill="rgba(27,150,255,0.3)" stroke="#1b96ff" stroke-width="1.5"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2" stroke="#22bef4" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="9" cy="10" r="1.5" fill="#ffffff"/>
            <circle cx="15" cy="10" r="1.5" fill="#ffffff"/>
            <path d="M7 8c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-dasharray="2 2"/>
          </svg>
          <div style="font-size:10px;color:rgba(255,255,255,.85);font-weight:600;letter-spacing:.06em;text-transform:uppercase">Agentforce</div>
        </div>
      </div>
      <div style="padding:4px 8px 8px" id="role-badge-wrap"></div>
      <!-- Theme switcher -->
      <div style="padding:4px 8px 12px;border-bottom:1px solid var(--sidebar-border);margin-bottom:8px">
        <div style="font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">Theme</div>
        <div class="col g4">
          <div class="row g4">
            <button class="theme-btn active" id="tb-default" onclick="setTheme('default')" style="flex:1;font-size:11px;padding:5px 8px">☀ SF Light</button>
            <button class="theme-btn" id="tb-sf-dark" onclick="setTheme('sf-dark')" style="flex:1;font-size:11px;padding:5px 8px">🌙 SF Dark</button>
          </div>
          <div class="row g4"><button class="theme-btn" id="tb-customer" onclick="setTheme('customer')" style="flex:1;font-size:11px;padding:5px 8px">🎨 <span id="tb-customer-label">Customer</span></button><button class="theme-btn" id="tb-customer-dark" onclick="setCustDark()" style="font-size:11px;padding:5px 8px" title="Customer dark mode">🌙</button></div>
        </div>
      </div>
      <nav id="nav-items" class="col" style="gap:2px;flex:1"></nav>
      <div style="font-size:9px;color:rgba(255,255,255,.25);text-align:center;padding:4px 0;margin-top:10px;letter-spacing:.06em">v<span id="app-version-lbl"></span></div>
      <button class="btn-ghost" style="width:100%;color:var(--text-muted)" onclick="logout()">&larr; Sign Out</button>
    </aside>
    <main class="main" id="main-content"></main>
  </div>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>

<script src="app.js"></script>

</body>
</html>
